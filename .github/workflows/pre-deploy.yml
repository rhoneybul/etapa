# ──────────────────────────────────────────────────────────────────────────────
# Pre-Deploy Checks
# Runs on every push to main. Ensures the server builds, tests pass,
# and the Expo app compiles without errors.
# ──────────────────────────────────────────────────────────────────────────────
name: Pre-Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Server Tests ────────────────────────────────────────────────────────
  server-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Run tests
        working-directory: server
        env:
          SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_KEY }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          ADMIN_API_KEY: ${{ secrets.TEST_ADMIN_API_KEY }}
          CRON_SECRET: ${{ secrets.TEST_CRON_SECRET }}
        run: npm test

  # ── 2. Expo Compile Check ──────────────────────────────────────────────────
  expo-build-check:
    name: Expo Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Expo Doctor
        run: npx expo-doctor@latest

      - name: TypeScript / Metro check
        run: npx expo export --platform web --output-dir /tmp/expo-export-check --dump-sourcemap false 2>&1 || true
        # This catches import errors, missing modules, and syntax errors
        # without needing a full native build.

  # ── 3. Admin Dashboard Build ───────────────────────────────────────────────
  admin-build:
    name: Admin Dashboard Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-dashboard/package-lock.json

      - name: Install deps
        working-directory: admin-dashboard
        run: npm ci

      - name: Build
        working-directory: admin-dashboard
        run: npm run build
        env:
          # Dummy values so Next.js build doesn't fail on missing env
          NEXTAUTH_SECRET: test-secret
          NEXTAUTH_URL: http://localhost:3000
          ETAPA_API_URL: http://localhost:3001
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key
