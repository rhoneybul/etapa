# ──────────────────────────────────────────────────────────────────────────────
# Pre-Deploy Checks
# Runs on every push/PR to main. Confirms the Expo app compiles and the
# admin dashboard builds. API tests have been split out to `test-api.yml`
# (manual trigger only).
# ──────────────────────────────────────────────────────────────────────────────
name: Pre-Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Expo Compile Check ──────────────────────────────────────────────────
  expo-build-check:
    name: Expo Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Expo Doctor
        run: npx expo-doctor@latest

      - name: TypeScript / Metro check
        run: npx expo export --platform web --output-dir /tmp/expo-export-check --dump-sourcemap false 2>&1 || true
        # This catches import errors, missing modules, and syntax errors
        # without needing a full native build.

  # ── 2. Admin Dashboard Build ───────────────────────────────────────────────
  admin-build:
    name: Admin Dashboard Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-dashboard/package-lock.json

      - name: Install deps
        working-directory: admin-dashboard
        run: npm ci

      - name: Build
        working-directory: admin-dashboard
        run: npm run build
        env:
          # Dummy values so Next.js build doesn't fail on missing env
          NEXTAUTH_SECRET: test-secret
          NEXTAUTH_URL: http://localhost:3000
          ETAPA_API_URL: http://localhost:3001
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key
