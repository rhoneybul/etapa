# ──────────────────────────────────────────────────────────────────────────────
# Publish the Etapa mobile app to Expo / the App Store
#
# Nothing here runs automatically on push. Two explicit ways to trigger:
#
#   1. Manual dispatch (recommended for day-to-day) —
#      Actions → "Publish Etapa App" → Run workflow.
#      Pick release type + version bump + platform.
#
#   2. Git tag matching `app-v*` — pushes a real release and submits to the
#      App Store. Use for proper versioned releases.
#        git tag app-v0.96.0 && git push --tags
#
# Two release paths available from either trigger:
#   - OTA update   (EAS Update)  — JS-only changes, ~2 min, no store review
#   - Native build (EAS Build)   — native deps / config changes, ~20-40 min,
#                                  optionally submits to the App Store.
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   EXPO_TOKEN   — expo.dev → Access Tokens → Create.
#
# What runs before publishing:
#   - Preflight (lint-only): expo-doctor + TypeScript check + Metro compile
#     check. Runs on Ubuntu in ~2 min. No API tests, no Maestro E2E —
#     those are handled separately or not at all.
#
# Versioning (important):
#   Release version is derived from the highest `app-v*` tag on origin,
#   NOT from app.json on main. We used to commit bumped app.json back to
#   main, but something in the repo/org config silently drops those pushes
#   (tags push fine, branch updates don't). Using tags as the source of
#   truth sidesteps this entirely and the workflow is robust regardless
#   of the state of app.json on main. The `Tag + GitHub Release` step at
#   the end pushes the new tag on success.
#
#   Patch bumps are ALSO handled automatically by EAS itself — see
#   eas.json → production.autoIncrement = "version". That means a bare
#   `eas build --profile production` (without going through this workflow)
#   will still bump the patch version + build number. The workflow's
#   explicit `bump` input is only strictly required for minor / major.
#
# Build order (important):
#   When platform=all, iOS builds/submits FIRST, Android second. This is
#   deliberate: iOS review takes longer, testers pick up TestFlight within
#   minutes, so iOS going into the queue first minimises total wall time
#   to "everyone has the new build".
# ──────────────────────────────────────────────────────────────────────────────
name: Publish Etapa App

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'ota'
        type: choice
        options:
          - ota             # OTA update only — fast, no app store review
          - build           # Native build, don't submit
          - build-submit    # Native build + submit to App Store
      bump:
        description: 'Version bump (patch is almost always what you want). "none" is only valid for OTA updates.'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - none
      platform:
        description: 'Platform(s)'
        required: true
        default: 'ios'
        type: choice
        options:
          - ios
          - android
          - all
      channel:
        description: 'OTA channel (only used for release_type=ota)'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - ci-test
          - staging
      dry_run:
        description: 'Dry run — preflight + version bump only, no publish'
        required: false
        default: false
        type: boolean

  push:
    tags:
      - 'app-v*'

concurrency:
  group: app-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Decide release parameters ───────────────────────────────────────────
  decide:
    name: Decide
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.decide.outputs.should_publish }}
      release_type:   ${{ steps.decide.outputs.release_type }}
      bump:           ${{ steps.decide.outputs.bump }}
      platform:       ${{ steps.decide.outputs.platform }}
      channel:        ${{ steps.decide.outputs.channel }}
      dry_run:        ${{ steps.decide.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v4

      - id: decide
        name: Decide release path
        run: |
          SHOULD=false
          TYPE="ota"
          BUMP="none"
          PLATFORM="ios"
          CHANNEL="production"
          DRY_RUN=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD=true
            TYPE="${{ github.event.inputs.release_type }}"
            BUMP="${{ github.event.inputs.bump }}"
            PLATFORM="${{ github.event.inputs.platform }}"
            CHANNEL="${{ github.event.inputs.channel }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
          elif [[ "${{ github.ref }}" == refs/tags/app-v* ]]; then
            # Tag push = real release — build + submit
            SHOULD=true
            TYPE="build-submit"
            BUMP="none"          # tag IS the version of record
            PLATFORM="ios"
            CHANNEL="production"
          fi

          echo "should_publish=$SHOULD" >> "$GITHUB_OUTPUT"
          echo "release_type=$TYPE"     >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP"             >> "$GITHUB_OUTPUT"
          echo "platform=$PLATFORM"     >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL"       >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN"       >> "$GITHUB_OUTPUT"

          echo "## Release plan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Publish? **$SHOULD**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Type: **$TYPE**"      >> "$GITHUB_STEP_SUMMARY"
          echo "- Bump: **$BUMP**"      >> "$GITHUB_STEP_SUMMARY"
          echo "- Platform: **$PLATFORM**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Channel: **$CHANNEL**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dry run? **$DRY_RUN**" >> "$GITHUB_STEP_SUMMARY"

  # ── 2. Preflight — lint only (no API tests, no E2E) ────────────────────────
  preflight:
    name: Preflight (lint)
    needs: decide
    if: needs.decide.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate app.json + package.json JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('app.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"
          echo "✓ app.json + package.json are valid JSON"

      - name: Expo Doctor (dependency + config sanity)
        run: npx expo-doctor@latest

      - name: TypeScript check (if tsconfig present)
        run: |
          if [ -f "tsconfig.json" ]; then
            echo "→ Running tsc --noEmit"
            npx tsc --noEmit --skipLibCheck
          else
            echo "→ No tsconfig.json found — skipping TypeScript check"
          fi

      - name: Metro bundle compile check
        run: |
          # Catches import errors, missing modules, and syntax errors.
          # Doesn't hit any API, doesn't boot the app, doesn't require a simulator.
          npx expo export --platform web --output-dir /tmp/expo-check --dump-sourcemap false 2>&1

  # Note: the old "Maestro E2E" job has been intentionally removed —
  # this workflow is lint-only by design. If you ever want E2E back,
  # see git history for this file before April 2026 where the full
  # job definition is preserved.

  # ── 3. Publish (EAS Update for OTA, EAS Build for native) ──────────────────
  publish:
    name: Publish (${{ needs.decide.outputs.release_type }})
    needs: [decide, preflight]
    if: needs.decide.outputs.should_publish == 'true' && needs.preflight.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write        # for git push + release creation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Setup EAS early so the baseline step below can query the remote
      # version. This moved up from its old position after version resolution.
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # ── Resolve target version from git tags (the real source of truth) ──
      # We used to derive the next version by bumping app.json on main, then
      # commit the bumped file back. That commit was being silently dropped
      # by some repo/org policy (confirmed: tags push fine, branch pushes
      # don't), so app.json on main stayed stale and every run kept landing
      # on the same already-submitted version.
      #
      # Now: fetch all release tags (`app-v*`), take the highest, and bump
      # from there. Tags are guaranteed to reflect what's actually been
      # shipped because the `Tag + GitHub Release` step at the end of each
      # successful run pushes them — and those tag pushes DO work.
      - name: Resolve target version
        id: version
        run: |
          git fetch --tags origin 2>/dev/null || true

          RELEASE_TYPE="${{ needs.decide.outputs.release_type }}"
          BUMP="${{ needs.decide.outputs.bump }}"

          # ── Guard: bump=none is only valid for OTA ─────────────────────────
          # OTA updates reuse the current version deliberately. Native builds
          # (build / build-submit) MUST bump — otherwise we collide with a
          # previously-submitted version and Apple/Google reject the upload.
          if [ "$BUMP" = "none" ] && [ "$RELEASE_TYPE" != "ota" ]; then
            echo ""
            echo "::error::bump=none is only valid for release_type=ota."
            echo "::error::Native builds (build / build-submit) must always bump the version, otherwise you'll hit the 'same version already submitted' error."
            echo "::error::Re-run with bump=patch (or higher)."
            exit 1
          fi

          # ── Version baseline = max(git tag, app.json, EAS remote) ──────────
          # Three sources can drift, so we take the highest to avoid ever
          # producing a version lower than something already shipped:
          #   1. git tag (app-v*)  — the workflow writes this on every success
          #   2. app.json version  — useful for first-ever run / hand-edits
          #   3. EAS remote        — can advance AHEAD of git tags when
          #      someone runs `eas build --profile production` locally,
          #      because eas.json has autoIncrement="version" so each
          #      production build bumps the remote patch automatically
          HIGHEST_TAG=$(git tag -l 'app-v*' | sed 's/^app-v//' | sort -V | tail -1)
          APPJSON_VER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('app.json','utf8')).expo.version)")

          # EAS remote version. We try iOS first (it's the one Apple cares
          # most about for duplicate-submission rejection), fall back to
          # Android, and swallow errors if remote isn't reachable (network
          # blip, first-ever run, etc.) — in that case we'll just baseline
          # off tag + app.json as before.
          EAS_REMOTE_VER=""
          if command -v eas >/dev/null 2>&1; then
            EAS_REMOTE_VER=$(eas build:version:get --platform ios --profile production --non-interactive 2>/dev/null | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
            if [ -z "$EAS_REMOTE_VER" ]; then
              EAS_REMOTE_VER=$(eas build:version:get --platform android --profile production --non-interactive 2>/dev/null | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
            fi
          fi

          # Take the max across all three (semver sort).
          BASELINE=$(printf '%s\n%s\n%s\n' "${HIGHEST_TAG:-0.0.0}" "${APPJSON_VER:-0.0.0}" "${EAS_REMOTE_VER:-0.0.0}" | sort -V | tail -1)
          # Don't let a 0.0.0 default slip through if app.json was actually present.
          if [ "$BASELINE" = "0.0.0" ]; then BASELINE="$APPJSON_VER"; fi

          echo "→ Highest release tag: ${HIGHEST_TAG:-(none)}"
          echo "→ app.json version:    $APPJSON_VER"
          echo "→ EAS remote version:  ${EAS_REMOTE_VER:-(unknown)}"
          echo "→ Baseline for bump:   $BASELINE"

          # Temporarily rewrite app.json in the runner to the real baseline
          # before bumping. This is purely ephemeral — we don't push it back.
          if [ "$BASELINE" != "$APPJSON_VER" ]; then
            node scripts/bump-app-version.js "$BASELINE" > /dev/null
            echo "→ Synced app.json up to baseline $BASELINE (runner-local only)"
          fi

          if [[ "${{ github.ref }}" == refs/tags/app-v* ]]; then
            V="${GITHUB_REF#refs/tags/app-v}"
            NEW=$(node scripts/bump-app-version.js "$V")
          else
            NEW=$(node scripts/bump-app-version.js "$BUMP")
          fi

          echo "→ Target version: $NEW"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "## Version: \`$NEW\`" >> "$GITHUB_STEP_SUMMARY"

          # ── No-op guard — native build must actually change the version ───
          # If NEW == BASELINE for a native build, something is wrong. Fail
          # loudly before burning EAS build time on a duplicate.
          if [ "$NEW" = "$BASELINE" ] && [ "$RELEASE_TYPE" != "ota" ]; then
            echo ""
            echo "::error::Resolved version ($NEW) is the same as the baseline ($BASELINE) — no bump actually applied."
            echo "::error::This would ship a duplicate version. Re-run with a bigger bump (patch/minor/major)."
            exit 1
          fi

          # ── Collision precheck — fail fast, before burning 40 min of EAS ─
          # If a tag for this version already exists (i.e. we've already
          # shipped it), refuse to build. User needs to pick a bigger bump.
          if git rev-parse "refs/tags/app-v$NEW" >/dev/null 2>&1; then
            echo ""
            echo "::error::Tag app-v$NEW already exists — this version has already been built and submitted."
            echo "::error::Re-running would create a duplicate submission that Apple/Google will reject."
            echo "::error::Fix: re-run the workflow with a bigger bump (patch → minor → major), or delete the stale tag if you're sure."
            exit 1
          fi

          # ── Monotonic precheck — version must be strictly greater than
          # EVERY existing release tag, not just the target tag.
          # This catches the case where someone manually edited app.json
          # downward (e.g. 0.99.0 → 0.98.0), or an earlier build's tag
          # push failed silently so baseline derivation fell back to a
          # lower value. Without this guard, we could still end up
          # shipping a semver-lower version than what's already live.
          is_greater() {
            # Returns 0 if $1 > $2 strictly by semver.
            [ "$1" != "$2" ] && [ "$(printf '%s\n%s\n' "$1" "$2" | sort -V | tail -1)" = "$1" ]
          }
          VIOLATIONS=""
          while read -r T; do
            [ -z "$T" ] && continue
            EXISTING="${T#app-v}"
            if ! is_greater "$NEW" "$EXISTING"; then
              VIOLATIONS="$VIOLATIONS $EXISTING"
            fi
          done < <(git tag -l 'app-v*' | sort -V)

          if [ -n "$VIOLATIONS" ]; then
            echo ""
            echo "::error::Target version $NEW is not strictly greater than existing release tag(s):$VIOLATIONS"
            echo "::error::Versions must only go up. This probably means app.json on main is behind what's been shipped, or a tag push failed earlier."
            echo "::error::Fix: re-run with a larger bump (patch → minor → major). The baseline will automatically pick up the highest tag and bump from there."
            exit 1
          fi

      # ── Pin EAS remote version to $NEW ─────────────────────────────────────
      # eas.json has `autoIncrement: true` which only bumps the BUILD number,
      # not the version string. To bump the semver version we have to set
      # it explicitly on the EAS remote before calling `eas build`. Done
      # here in the workflow only — local `eas build` calls just bump build
      # number, which is the safer default for dev work.
      - name: Pin EAS remote version to ${{ steps.version.outputs.new }}
        if: needs.decide.outputs.release_type != 'ota' && needs.decide.outputs.dry_run != 'true'
        run: |
          NEW="${{ steps.version.outputs.new }}"
          echo "→ Setting EAS remote version for iOS + Android to $NEW"
          # --non-interactive prevents a prompt; errors are non-fatal — the
          # collision precheck above already caught any real version mismatch.
          eas build:version:set --platform ios --profile production --value "$NEW" --non-interactive || \
            echo "::warning::Failed to pin iOS remote version to $NEW — proceeding; EAS autoIncrement will bump build number only"
          eas build:version:set --platform android --profile production --value "$NEW" --non-interactive || \
            echo "::warning::Failed to pin Android remote version to $NEW — proceeding; EAS autoIncrement will bump versionCode only"

      - name: Skip publish (dry run)
        if: needs.decide.outputs.dry_run == 'true'
        run: |
          echo "→ Dry run — skipping EAS operations"
          echo "- **DRY RUN** — no actual publish happened" >> "$GITHUB_STEP_SUMMARY"

      # ── OTA update path ─────────────────────────────────────────────────────
      # SENTRY_AUTH_TOKEN is piped in so the @sentry/react-native/expo plugin
      # can upload source maps for the JS bundle this update ships. Without
      # it, OTA updates produce un-symbolicated crash stacks in Sentry even
      # if native builds are wired up correctly.
      - name: EAS Update (OTA)
        if: needs.decide.outputs.release_type == 'ota' && needs.decide.outputs.dry_run != 'true'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          CHANNEL="${{ needs.decide.outputs.channel }}"
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "::warning::SENTRY_AUTH_TOKEN not set — OTA source maps will NOT be uploaded."
            echo "::warning::Set it in GitHub → Settings → Secrets → Actions to symbolicate Sentry stacks for OTA releases."
          fi
          eas update \
            --branch "$CHANNEL" \
            --message "v${{ steps.version.outputs.new }} — $(git log -1 --pretty=%s | head -c 80)" \
            --non-interactive
          echo "- Published OTA update to **$CHANNEL** channel" >> "$GITHUB_STEP_SUMMARY"

      # ── Native build path ───────────────────────────────────────────────────
      # When platform=all we run iOS first, then Android — iOS reviews take
      # longer and testers pick up TestFlight within minutes, so getting the
      # iOS submission in the queue first is the priority.
      - name: EAS Build
        if: needs.decide.outputs.release_type == 'build' && needs.decide.outputs.dry_run != 'true'
        run: |
          PLATFORM="${{ needs.decide.outputs.platform }}"
          if [ "$PLATFORM" = "all" ]; then
            echo "→ Platform=all: kicking iOS first, then Android…"
            eas build --profile production --platform ios --non-interactive --no-wait
            echo "→ iOS kicked off. Now Android…"
            eas build --profile production --platform android --non-interactive --no-wait
            echo "- Kicked off EAS Build on **iOS** then **Android**" >> "$GITHUB_STEP_SUMMARY"
          else
            eas build --profile production --platform "$PLATFORM" --non-interactive --no-wait
            echo "- Kicked off EAS Build on **$PLATFORM**" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- Watch it at https://expo.dev/accounts/rhoneybul/projects/etapa/builds" >> "$GITHUB_STEP_SUMMARY"

      # ── Submit path ────────────────────────────────────────────────────────
      # Same iOS-first sequencing for build-submit. Waits for each platform's
      # submission before starting the next so TestFlight is live before the
      # Play Store build kicks off.
      - name: EAS Build + Submit (wait)
        if: needs.decide.outputs.release_type == 'build-submit' && needs.decide.outputs.dry_run != 'true'
        run: |
          PLATFORM="${{ needs.decide.outputs.platform }}"
          if [ "$PLATFORM" = "all" ]; then
            echo "→ Platform=all: building + submitting iOS first, then Android…"
            eas build --profile production --platform ios --non-interactive --auto-submit
            echo "→ iOS submitted. Starting Android…"
            eas build --profile production --platform android --non-interactive --auto-submit
            echo "- Auto-submitted **iOS** then **Android** to the stores" >> "$GITHUB_STEP_SUMMARY"
          else
            eas build --profile production --platform "$PLATFORM" --non-interactive --auto-submit
            echo "- Auto-submitted to the store" >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── Tag + Release (version commit already happened pre-build) ──────────
      - name: Tag + GitHub Release
        if: needs.decide.outputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TYPE: ${{ needs.decide.outputs.release_type }}
          PLATFORM: ${{ needs.decide.outputs.platform }}
          VERSION: ${{ steps.version.outputs.new }}
        run: |
          TAG="app-v${VERSION}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

          # Build release notes in a file (avoids multi-line YAML quoting pain)
          LAST_TAG=$(git describe --tags --abbrev=0 --match='app-v*' "HEAD^" 2>/dev/null || git rev-list --max-parents=0 HEAD)
          {
            echo "Release type: **${RELEASE_TYPE}**"
            echo "Platform: ${PLATFORM}"
            echo ""
            echo "### Changes"
            git log --pretty='* %s (%h)' "${LAST_TAG}..HEAD" -- . ':!mcp-server' ':!server' 2>/dev/null | head -30
          } > /tmp/release-notes.md

          gh release create "$TAG" \
            --title "Etapa App v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            --latest || echo "Release already exists, skipping"
