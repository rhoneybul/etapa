# ──────────────────────────────────────────────────────────────────────────────
# Publish the Etapa mobile app to Expo / the App Store
#
# Nothing here runs automatically on push. Two explicit ways to trigger:
#
#   1. Manual dispatch (recommended for day-to-day) —
#      Actions → "Publish Etapa App" → Run workflow.
#      Pick release type + version bump + platform.
#
#   2. Git tag matching `app-v*` — pushes a real release and submits to the
#      App Store. Use for proper versioned releases.
#        git tag app-v0.96.0 && git push --tags
#
# Two release paths available from either trigger:
#   - OTA update   (EAS Update)  — JS-only changes, ~2 min, no store review
#   - Native build (EAS Build)   — native deps / config changes, ~20-40 min,
#                                  optionally submits to the App Store.
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   EXPO_TOKEN   — expo.dev → Access Tokens → Create.
#
# What runs before publishing:
#   - Preflight (lint-only): expo-doctor + TypeScript check + Metro compile
#     check. Runs on Ubuntu in ~2 min. No API tests, no Maestro E2E —
#     those are handled separately or not at all.
# ──────────────────────────────────────────────────────────────────────────────
name: Publish Etapa App

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'ota'
        type: choice
        options:
          - ota             # OTA update only — fast, no app store review
          - build           # Native build, don't submit
          - build-submit    # Native build + submit to App Store
      bump:
        description: 'Version bump (app.json)'
        required: true
        default: 'patch'
        type: choice
        options:
          - none
          - patch
          - minor
          - major
      platform:
        description: 'Platform(s)'
        required: true
        default: 'ios'
        type: choice
        options:
          - ios
          - android
          - all
      channel:
        description: 'OTA channel (only used for release_type=ota)'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - ci-test
          - staging
      dry_run:
        description: 'Dry run — preflight + version bump only, no publish'
        required: false
        default: false
        type: boolean

  push:
    tags:
      - 'app-v*'

concurrency:
  group: app-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Decide release parameters ───────────────────────────────────────────
  decide:
    name: Decide
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.decide.outputs.should_publish }}
      release_type:   ${{ steps.decide.outputs.release_type }}
      bump:           ${{ steps.decide.outputs.bump }}
      platform:       ${{ steps.decide.outputs.platform }}
      channel:        ${{ steps.decide.outputs.channel }}
      dry_run:        ${{ steps.decide.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v4

      - id: decide
        name: Decide release path
        run: |
          SHOULD=false
          TYPE="ota"
          BUMP="none"
          PLATFORM="ios"
          CHANNEL="production"
          DRY_RUN=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD=true
            TYPE="${{ github.event.inputs.release_type }}"
            BUMP="${{ github.event.inputs.bump }}"
            PLATFORM="${{ github.event.inputs.platform }}"
            CHANNEL="${{ github.event.inputs.channel }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
          elif [[ "${{ github.ref }}" == refs/tags/app-v* ]]; then
            # Tag push = real release — build + submit
            SHOULD=true
            TYPE="build-submit"
            BUMP="none"          # tag IS the version of record
            PLATFORM="ios"
            CHANNEL="production"
          fi

          echo "should_publish=$SHOULD" >> "$GITHUB_OUTPUT"
          echo "release_type=$TYPE"     >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP"             >> "$GITHUB_OUTPUT"
          echo "platform=$PLATFORM"     >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL"       >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN"       >> "$GITHUB_OUTPUT"

          echo "## Release plan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Publish? **$SHOULD**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Type: **$TYPE**"      >> "$GITHUB_STEP_SUMMARY"
          echo "- Bump: **$BUMP**"      >> "$GITHUB_STEP_SUMMARY"
          echo "- Platform: **$PLATFORM**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Channel: **$CHANNEL**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dry run? **$DRY_RUN**" >> "$GITHUB_STEP_SUMMARY"

  # ── 2. Preflight — lint only (no API tests, no E2E) ────────────────────────
  preflight:
    name: Preflight (lint)
    needs: decide
    if: needs.decide.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate app.json + package.json JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('app.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"
          echo "✓ app.json + package.json are valid JSON"

      - name: Expo Doctor (dependency + config sanity)
        run: npx expo-doctor@latest

      - name: TypeScript check (if tsconfig present)
        run: |
          if [ -f "tsconfig.json" ]; then
            echo "→ Running tsc --noEmit"
            npx tsc --noEmit --skipLibCheck
          else
            echo "→ No tsconfig.json found — skipping TypeScript check"
          fi

      - name: Metro bundle compile check
        run: |
          # Catches import errors, missing modules, and syntax errors.
          # Doesn't hit any API, doesn't boot the app, doesn't require a simulator.
          npx expo export --platform web --output-dir /tmp/expo-check --dump-sourcemap false 2>&1

  # Note: the old "Maestro E2E" job has been intentionally removed —
  # this workflow is lint-only by design. If you ever want E2E back,
  # see git history for this file before April 2026 where the full
  # job definition is preserved.

  # ── 3. Publish (EAS Update for OTA, EAS Build for native) ──────────────────
  publish:
    name: Publish (${{ needs.decide.outputs.release_type }})
    needs: [decide, preflight]
    if: needs.decide.outputs.should_publish == 'true' && needs.preflight.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write        # for git push + release creation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve target version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/app-v* ]]; then
            # Tag drives the version — extract + sync app.json
            V="${GITHUB_REF#refs/tags/app-v}"
            echo "→ Syncing app.json to match tag: $V"
            NEW=$(node scripts/bump-app-version.js "$V")
          else
            NEW=$(node scripts/bump-app-version.js "${{ needs.decide.outputs.bump }}")
          fi
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "→ app.json version is now $NEW"
          echo "## Version: \`$NEW\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Skip publish (dry run)
        if: needs.decide.outputs.dry_run == 'true'
        run: |
          echo "→ Dry run — skipping EAS operations"
          echo "- **DRY RUN** — no actual publish happened" >> "$GITHUB_STEP_SUMMARY"

      # ── OTA update path ─────────────────────────────────────────────────────
      - name: EAS Update (OTA)
        if: needs.decide.outputs.release_type == 'ota' && needs.decide.outputs.dry_run != 'true'
        run: |
          CHANNEL="${{ needs.decide.outputs.channel }}"
          eas update \
            --branch "$CHANNEL" \
            --message "v${{ steps.version.outputs.new }} — $(git log -1 --pretty=%s | head -c 80)" \
            --non-interactive
          echo "- Published OTA update to **$CHANNEL** channel" >> "$GITHUB_STEP_SUMMARY"

      # ── Native build path ───────────────────────────────────────────────────
      - name: EAS Build
        if: (needs.decide.outputs.release_type == 'build' || needs.decide.outputs.release_type == 'build-submit') && needs.decide.outputs.dry_run != 'true'
        run: |
          PLATFORM="${{ needs.decide.outputs.platform }}"
          eas build \
            --profile production \
            --platform "$PLATFORM" \
            --non-interactive \
            --no-wait
          echo "- Kicked off EAS Build on **$PLATFORM**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Watch it at https://expo.dev/accounts/rhoneybul/projects/etapa/builds" >> "$GITHUB_STEP_SUMMARY"

      # ── Submit path ────────────────────────────────────────────────────────
      - name: EAS Build + Submit (wait)
        if: needs.decide.outputs.release_type == 'build-submit' && needs.decide.outputs.dry_run != 'true'
        run: |
          PLATFORM="${{ needs.decide.outputs.platform }}"
          eas build \
            --profile production \
            --platform "$PLATFORM" \
            --non-interactive \
            --auto-submit
          echo "- Auto-submitted to the stores" >> "$GITHUB_STEP_SUMMARY"

      # ── Commit version bump + tag + release ────────────────────────────────
      - name: Commit version change back to main
        if: needs.decide.outputs.dry_run != 'true'
        run: |
          git add app.json
          if git diff --staged --quiet; then
            echo "→ No version change to commit (file already matched)"
          else
            git commit -m "chore(app): sync to v${{ steps.version.outputs.new }}"
            git push origin HEAD:main
            echo "→ Pushed version sync to main"
          fi

      - name: Tag + GitHub Release
        if: needs.decide.outputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TYPE: ${{ needs.decide.outputs.release_type }}
          PLATFORM: ${{ needs.decide.outputs.platform }}
          VERSION: ${{ steps.version.outputs.new }}
        run: |
          TAG="app-v${VERSION}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

          # Build release notes in a file (avoids multi-line YAML quoting pain)
          LAST_TAG=$(git describe --tags --abbrev=0 --match='app-v*' "HEAD^" 2>/dev/null || git rev-list --max-parents=0 HEAD)
          {
            echo "Release type: **${RELEASE_TYPE}**"
            echo "Platform: ${PLATFORM}"
            echo ""
            echo "### Changes"
            git log --pretty='* %s (%h)' "${LAST_TAG}..HEAD" -- . ':!mcp-server' ':!server' 2>/dev/null | head -30
          } > /tmp/release-notes.md

          gh release create "$TAG" \
            --title "Etapa App v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            --latest || echo "Release already exists, skipping"
