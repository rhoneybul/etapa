<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etapa — Plan Generator Test Dashboard</title>
<style>
  :root {
    --bg: #0f0f13; --surface: #1a1a24; --surface2: #22222f;
    --border: #2d2d3d; --text: #e4e4ef; --muted: #8888a0;
    --pink: #E8458B; --blue: #3B82F6; --green: #34d399;
    --red: #f87171; --orange: #fbbf24; --purple: #a78bfa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header ── */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
  .header h1 span { color: var(--pink); }
  .header .stats { margin-left: auto; display: flex; gap: 10px; font-size: 12px; }
  .header .stats .stat { padding: 3px 10px; border-radius: 5px; background: var(--surface2); }
  .stat.pass { color: var(--green); } .stat.fail { color: var(--red); } .stat.warn { color: var(--orange); }

  /* ── File loader ── */
  .loader { padding: 10px 20px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; font-size: 12px; }
  .loader label { cursor: pointer; padding: 5px 12px; border-radius: 5px; background: var(--pink); color: white; font-weight: 500; transition: .15s; font-size: 12px; }
  .loader label:hover { filter: brightness(1.15); }
  .loader input { display: none; }
  .loader .filename { color: var(--muted); }

  /* ── Main layout ── */
  .main { display: flex; height: calc(100vh - 90px); overflow: hidden; }

  /* ── Sidebar — scenario list ── */
  .sidebar { width: 320px; min-width: 320px; border-right: 1px solid var(--border); overflow-y: auto; background: var(--bg); }
  .sidebar-header { padding: 12px 16px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .scenario-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: .1s; display: flex; align-items: flex-start; gap: 10px; }
  .scenario-item:hover { background: var(--surface); }
  .scenario-item.selected { background: var(--surface); border-left: 3px solid var(--pink); }
  .scenario-item .num { font-size: 11px; color: var(--muted); min-width: 22px; padding-top: 2px; }
  .scenario-item .info { flex: 1; min-width: 0; }
  .scenario-item .name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .scenario-item .meta { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; gap: 6px; flex-wrap: wrap; }
  .scenario-item .badge { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 3px; }
  .badge.pass { background: rgba(52,211,153,.15); color: var(--green); }
  .badge.fail { background: rgba(248,113,113,.15); color: var(--red); }
  .badge.warn { background: rgba(251,191,36,.15); color: var(--orange); }
  .badge.pending { background: rgba(136,136,160,.1); color: var(--muted); }

  /* ── Detail area ── */
  .detail { flex: 1; overflow-y: auto; padding: 0; }
  .detail-inner { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

  /* ── Scenario title bar ── */
  .scenario-title-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .scenario-title-bar h2 { font-size: 18px; font-weight: 600; }
  .scenario-title-bar .badge { font-size: 12px; padding: 3px 10px; }

  /* ── Input summary cards ── */
  .input-strip { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .input-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .input-card h4 { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
  .input-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 13px; border-bottom: 1px solid rgba(45,45,61,.4); }
  .input-row:last-child { border: none; }
  .input-row .label { color: var(--muted); }
  .input-row .value { font-weight: 500; text-align: right; max-width: 60%; }

  /* ── Stats bar ── */
  .stats-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; text-align: center; min-width: 80px; }
  .stat-pill .n { font-size: 20px; font-weight: 700; color: var(--pink); }
  .stat-pill .l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .3px; }

  /* ── Errors & warnings ── */
  .msg-section { margin-bottom: 16px; }
  .msg-section h4 { font-size: 12px; font-weight: 600; margin-bottom: 6px; }
  .msg-list { list-style: none; }
  .msg-list li { padding: 5px 10px; font-size: 12px; border-radius: 5px; margin-bottom: 3px; }
  .msg-list li.error { background: rgba(248,113,113,.1); color: var(--red); }
  .msg-list li.warning { background: rgba(251,191,36,.1); color: var(--orange); }
  .msg-list li::before { margin-right: 6px; }
  .msg-list li.error::before { content: "✗"; } .msg-list li.warning::before { content: "⚠"; }

  /* ── Section headers ── */
  .section-header { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; margin-top: 4px; display: flex; align-items: center; gap: 8px; }
  .section-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── Plan calendar ── */
  .plan-calendar { overflow-x: auto; margin-bottom: 20px; }
  .cal-header-row { display: flex; gap: 3px; margin-bottom: 3px; }
  .cal-header-row .wk { width: 44px; min-width: 44px; }
  .cal-header { flex: 1; min-width: 110px; text-align: center; font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; padding: 4px 0; }

  .week-row { display: flex; gap: 3px; margin-bottom: 3px; align-items: stretch; min-height: 54px; }
  .week-label { width: 44px; min-width: 44px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--muted); font-weight: 600; background: var(--surface); border-radius: 6px; }
  .day-cell { flex: 1; min-width: 110px; background: var(--surface); border-radius: 6px; padding: 5px 7px; font-size: 10px; border: 1px solid transparent; cursor: default; transition: .1s; position: relative; }
  .day-cell:hover { border-color: var(--border); z-index: 5; }
  .day-cell .act-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 1px; font-size: 11px; }
  .day-cell .act-meta { color: var(--muted); font-size: 10px; }
  .day-cell .act-badges { display: flex; gap: 3px; margin-top: 2px; }
  .act-badge { font-size: 9px; padding: 0 4px; border-radius: 3px; font-weight: 600; }
  .day-cell.empty { opacity: .25; }
  .day-cell.ride { border-left: 3px solid var(--blue); }
  .day-cell.strength { border-left: 3px solid var(--red); }
  .day-cell.organised { border-left: 3px solid var(--orange); background: rgba(251,191,36,.05); }
  .day-cell.recurring { border-left: 3px solid var(--purple); background: rgba(167,139,250,.05); }
  .day-cell.recovery { border-left: 3px solid var(--green); }
  .day-cell.cross-training { border-left: 3px solid var(--purple); opacity: .55; }

  /* ── Volume chart ── */
  .volume-chart { display: flex; gap: 2px; align-items: end; height: 80px; margin-bottom: 20px; }
  .vol-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .vol-bar { width: 100%; border-radius: 3px 3px 0 0; min-width: 8px; transition: .2s; }
  .vol-bar:hover { filter: brightness(1.3); }
  .vol-label { font-size: 9px; color: var(--muted); }
  .vol-value { font-size: 9px; color: var(--muted); }

  /* ── Legend ── */
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* ── Tooltip ── */
  .tooltip { display: none; position: fixed; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; max-width: 340px; z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,.6); font-size: 12px; }
  .tooltip.show { display: block; }
  .tooltip h4 { font-size: 13px; margin-bottom: 6px; }
  .tooltip .desc { color: var(--muted); margin-bottom: 6px; line-height: 1.4; }
  .tooltip .meta-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .tooltip .meta-row .k { color: var(--muted); } .tooltip .meta-row .v { font-weight: 500; }

  /* ── No data ── */
  .no-data { text-align: center; padding: 60px 20px; color: var(--muted); }
  .no-data .icon { font-size: 48px; margin-bottom: 12px; }

  /* ── JSON ── */
  .json-view { background: var(--surface2); border-radius: 8px; padding: 12px 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; max-height: 400px; overflow: auto; white-space: pre-wrap; word-break: break-all; color: var(--muted); line-height: 1.5; }

  /* ── Tag ── */
  .tag { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--surface2); color: var(--muted); display: inline-block; }
  .tag.green { color: var(--green); } .tag.blue { color: var(--blue); } .tag.orange { color: var(--orange); }
  .tag.pink { color: var(--pink); } .tag.purple { color: var(--purple); } .tag.red { color: var(--red); }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .main { flex-direction: column; height: auto; }
    .sidebar { width: 100%; min-width: 0; max-height: 250px; border-right: none; border-bottom: 1px solid var(--border); }
    .detail { overflow: visible; }
  }
</style>
</head>

  { name: 'Cross-training: running 3x/week (injury prevention)', goal: { id: 'g25', goalType: 'improve', cyclingType: 'road', planName: 'Runner-Cyclist Plan' }, config: { id: 'c25', daysPerWeek: 4, weeks: 8, trainingTypes: ['outdoor'], availableDays: ['monday', 'wednesday', 'friday', 'sunday'], fitnessLevel: 'intermediate', startDate: '2026-04-06', crossTrainingDays: { tuesday: 'running', thursday: 'running', saturday: 'running' } } },
  { name: 'Cross-training: rowing + swimming (mixed impact)', goal: { id: 'g26', goalType: 'race', cyclingType: 'road', eventName: 'Sprint Triathlon', targetDistance: 40, targetDate: '2026-06-28', planName: 'Tri Bike Prep' }, config: { id: 'c26', daysPerWeek: 3, weeks: 10, trainingTypes: ['outdoor', 'strength'], availableDays: ['monday', 'wednesday', 'saturday'], fitnessLevel: 'advanced', startDate: '2026-04-13', crossTrainingDays: { tuesday: 'rowing', thursday: 'swimming', friday: 'running' } } },
  { name: 'Cross-training: yoga + pilates (low impact)', goal: { id: 'g27', goalType: 'improve', cyclingType: 'road', planName: 'Balanced Wellness' }, config: { id: 'c27', daysPerWeek: 4, weeks: 8, trainingTypes: ['outdoor'], availableDays: ['monday', 'tuesday', 'thursday', 'saturday'], fitnessLevel: 'intermediate', startDate: '2026-04-06', crossTrainingDays: { wednesday: 'yoga', friday: 'pilates', sunday: 'yoga' } } },
  { name: 'Cross-training: gym + running (max stress)', goal: { id: 'g28', goalType: 'distance', cyclingType: 'road', targetDistance: 100, targetDate: '2026-07-19', planName: 'Ironman Bike Leg' }, config: { id: 'c28', daysPerWeek: 4, weeks: 12, trainingTypes: ['outdoor'], availableDays: ['monday', 'tuesday', 'thursday', 'saturday'], fitnessLevel: 'advanced', startDate: '2026-04-13', longRideDay: 'saturday', crossTrainingDays: { wednesday: 'weight training', friday: 'running', sunday: 'hiking' } } },
  { name: 'Cross-training: multi-activity days (high fatigue)', goal: { id: 'g29', goalType: 'improve', cyclingType: 'road', planName: 'Multi-Sport Plan' }, config: { id: 'c29', daysPerWeek: 3, weeks: 8, trainingTypes: ['outdoor'], availableDays: ['monday', 'wednesday', 'saturday'], fitnessLevel: 'intermediate', startDate: '2026-04-06', crossTrainingDays: { tuesday: 'running', thursday: 'swimming', friday: 'rowing', sunday: 'hiking' } } },
  { name: 'Cross-training + recurring: run before club ride', goal: { id: 'g30', goalType: 'improve', cyclingType: 'road', planName: 'Multi-Sport Club' }, config: { id: 'c30', daysPerWeek: 4, weeks: 8, trainingTypes: ['outdoor'], availableDays: ['monday', 'tuesday', 'thursday', 'saturday'], fitnessLevel: 'intermediate', startDate: '2026-04-06', recurringRides: [{ id: 'rr7', day: 'saturday', durationMins: 120, distanceKm: 50, notes: 'Club Ride' }], crossTrainingDays: { wednesday: 'running', friday: 'running', sunday: 'yoga' } } },
];

// ── State ──
let apiResults = null;
let selectedIdx = 0;

// ── File loader ──
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('fileName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = ev => {
    try { apiResults = JSON.parse(ev.target.result); render(); }
    catch (err) { alert('Invalid JSON: ' + err.message); }
  };
  reader.readAsText(file);
});

function selectScenario(idx) { selectedIdx = idx; render(); }
function getResult(idx) { return apiResults?.results?.[idx] || null; }

// ── Render all ──
function render() {
  renderHeaderStats();
  renderSidebar();
  renderDetail();
}

function renderHeaderStats() {
  const el = document.getElementById('headerStats');
  if (!apiResults) { el.innerHTML = '<span class="stat" style="color:var(--muted)">No results loaded</span>'; return; }
  const p = apiResults.passed || 0, f = apiResults.failed || 0;
  const totalW = (apiResults.results || []).reduce((s, r) => s + (r.warnings?.length || 0), 0);
  el.innerHTML = `
    <span class="stat pass">${p} passed</span>
    <span class="stat fail">${f} failed</span>
    <span class="stat warn">${totalW} warnings</span>
    <span class="stat" style="color:var(--muted)">${new Date(apiResults.runAt).toLocaleString()}</span>
  `;
}

// ── Sidebar ──
function renderSidebar() {
  const el = document.getElementById('sidebar');
  let html = `<div class="sidebar-header">Scenarios (${SCENARIOS.length})</div>`;
  SCENARIOS.forEach((s, i) => {
    const r = getResult(i);
    const warnCount = r?.warnings?.length || 0;
    let badgeHtml = '';
    if (r) {
      if (!r.pass) badgeHtml = '<span class="badge fail">FAIL</span>';
      else if (warnCount > 0) badgeHtml = `<span class="badge warn">WARN ${warnCount}</span>`;
      else badgeHtml = '<span class="badge pass">PASS</span>';
    } else {
      badgeHtml = '<span class="badge pending">—</span>';
    }
    const acts = r?.stats?.totalActivities ? `${r.stats.totalActivities} acts` : '';
    const dur = r?.durationMs ? `${(r.durationMs/1000).toFixed(1)}s` : '';
    const metaParts = [acts, dur].filter(Boolean).join(' · ');

    html += `<div class="scenario-item ${i===selectedIdx?'selected':''}" onclick="selectScenario(${i})">
      <span class="num">${i+1}</span>
      <div class="info">
        <div class="name">${esc(s.name)}</div>
        <div class="meta">${badgeHtml} ${metaParts ? `<span>${metaParts}</span>` : ''}</div>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

// ── Detail pane ──
function renderDetail() {
  const el = document.getElementById('detail');
  const s = SCENARIOS[selectedIdx];
  const r = getResult(selectedIdx);
  const g = s.goal, c = s.config;
  const hasPlan = r?.plan?.activities?.length > 0;
  const warnCount = r?.warnings?.length || 0;
  const errCount = r?.errors?.length || 0;

  // Badge
  let badgeHtml = '';
  if (r) {
    if (!r.pass) badgeHtml = '<span class="badge fail" style="font-size:13px;padding:4px 12px">FAIL</span>';
    else if (warnCount > 0) badgeHtml = `<span class="badge warn" style="font-size:13px;padding:4px 12px">WARN (${warnCount})</span>`;
    else badgeHtml = '<span class="badge pass" style="font-size:13px;padding:4px 12px">PASS</span>';
  }

  let html = '<div class="detail-inner">';

  // ── Title ──
  html += `<div class="scenario-title-bar">
    <h2>#${selectedIdx+1} ${esc(s.name)}</h2>
    ${badgeHtml}
    ${r?.durationMs ? `<span style="font-size:12px;color:var(--muted);margin-left:auto">${(r.durationMs/1000).toFixed(1)}s</span>` : ''}
  </div>`;

  // ── Input cards ──
  html += '<div class="section-header">Inputs</div>';
  html += '<div class="input-strip">';

  // Goal card
  html += '<div class="input-card"><h4>Goal</h4>';
  html += row('Type', g.goalType);
  html += row('Cycling', g.cyclingType);
  if (g.eventName) html += row('Event', g.eventName);
  if (g.targetDistance) html += row('Distance', g.targetDistance + ' km');
  if (g.targetElevation) html += row('Elevation', g.targetElevation + ' m');
  if (g.targetTime) html += row('Time', g.targetTime + ' hrs');
  if (g.targetDate) html += row('Event Date', g.targetDate);
  html += '</div>';

  // Config card
  html += '<div class="input-card"><h4>Config</h4>';
  html += row('Fitness', c.fitnessLevel);
  html += row('Days/week', c.daysPerWeek);
  html += row('Weeks', c.weeks);
  html += row('Start', c.startDate);
  html += row('Training', c.trainingTypes?.join(', '));
  html += row('Days', c.availableDays?.map(d => d.slice(0,3)).join(', '));
  if (c.longRideDay) html += row('Long ride', c.longRideDay);
  html += '</div>';

  // Recurring rides
  if (c.recurringRides?.length) {
    html += '<div class="input-card"><h4>Recurring Rides</h4>';
    c.recurringRides.forEach(rr => {
      html += row(rr.notes || rr.day, `${rr.day} · ${rr.durationMins}min · ${rr.distanceKm||'?'}km`);
    });
    html += '</div>';
  }

  // Organised rides
  if (c.oneOffRides?.length) {
    html += '<div class="input-card"><h4>Organised Rides</h4>';
    c.oneOffRides.forEach(oo => {
      html += row(oo.notes || oo.date, `${oo.date} · ${oo.durationMins}min · ${oo.distanceKm||'?'}km`);
    });
    html += '</div>';
  }

  // Cross-training
  if (c.crossTrainingDays && Object.keys(c.crossTrainingDays).length) {
    html += '<div class="input-card"><h4>Cross-Training</h4>';
    Object.entries(c.crossTrainingDays).forEach(([d, a]) => { html += row(d, a); });
    html += '</div>';
  }
  html += '</div>'; // end input-strip

  // ── Errors & warnings ──
  if (errCount > 0 || warnCount > 0) {
    html += '<div class="msg-section">';
    if (errCount > 0) {
      html += `<h4 style="color:var(--red)">Errors (${errCount})</h4><ul class="msg-list">`;
      r.errors.forEach(e => { html += `<li class="error">${esc(e)}</li>`; });
      html += '</ul>';
    }
    if (warnCount > 0) {
      html += `<h4 style="color:var(--orange);${errCount?'margin-top:10px':''}">Warnings (${warnCount})</h4><ul class="msg-list">`;
      r.warnings.forEach(w => { html += `<li class="warning">${esc(w)}</li>`; });
      html += '</ul>';
    }
    html += '</div>';
  }

  // ── Plan results ──
  if (hasPlan) {
    // Stats bar
    html += '<div class="section-header">Results</div>';
    html += '<div class="stats-bar">';
    const st = r.stats;
    html += pill(st.totalActivities, 'Total');
    html += pill(st.rides, 'Rides');
    html += pill(st.strength, 'Strength');
    html += pill(st.organised, 'Organised');
    html += pill(st.recurring, 'Recurring');
    html += pill(st.recovery, 'Recovery');
    html += pill(st.weeks, 'Weeks');
    html += '</div>';

    // Legend
    html += '<div class="legend">';
    html += legendItem('var(--blue)', 'Ride');
    html += legendItem('var(--green)', 'Recovery');
    html += legendItem('var(--red)', 'Strength');
    html += legendItem('var(--orange)', 'Organised');
    html += legendItem('var(--purple)', 'Recurring / Cross-training');
    html += '</div>';

    // Calendar
    html += '<div class="section-header">Plan Calendar</div>';
    html += renderCalendar(r.plan, s);

    // Volume chart
    html += '<div class="section-header" style="margin-top:20px">Weekly Volume</div>';
    html += renderVolumeChart(r.plan);
  } else if (!r) {
    html += '<div class="no-data" style="padding:40px"><div class="icon">📋</div><p>Load an API results JSON to see the generated plan. Run tests with <code>--output results.json</code></p></div>';
  } else {
    html += '<div class="no-data" style="padding:40px"><div class="icon">⚠️</div><p>No plan data in results for this scenario.</p></div>';
  }

  // Raw JSON toggle
  html += `<details style="margin-top:20px"><summary style="font-size:12px;color:var(--muted);cursor:pointer;padding:8px 0">Raw JSON</summary>`;
  html += `<div class="json-view">${esc(JSON.stringify(r || s, null, 2))}</div></details>`;

  html += '</div>'; // end detail-inner
  el.innerHTML = html;
  el.scrollTop = 0;
}

// ── Calendar renderer ──
function renderCalendar(plan, scenario) {
  if (!plan?.activities?.length) return '';
  const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const dayFull = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
  let html = '<div class="plan-calendar">';

  // Header
  html += '<div class="cal-header-row"><div class="wk"></div>';
  dayNames.forEach(d => { html += `<div class="cal-header">${d}</div>`; });
  html += '</div>';

  for (let w = 1; w <= plan.weeks; w++) {
    html += `<div class="week-row"><div class="week-label">W${w}</div>`;
    for (let d = 0; d < 7; d++) {
      // Multiple activities on same day
      const acts = plan.activities.filter(a => a.week === w && a.dayOfWeek === d);
      if (acts.length > 0) {
        const act = acts[0]; // primary
        const cls = act.scheduleType === 'organised' ? 'organised'
          : act.scheduleType === 'recurring' ? 'recurring'
          : (act.effort === 'recovery' || act.subType === 'recovery') ? 'recovery'
          : act.type === 'strength' ? 'strength' : 'ride';
        const effortBadge = act.effort ? `<span class="act-badge" style="background:${effortColor(act.effort)};color:#000">${act.effort}</span>` : '';
        const typeBadge = act.subType ? `<span class="act-badge" style="background:var(--surface);color:var(--muted)">${act.subType}</span>` : '';

        html += `<div class="day-cell ${cls}" onmouseenter="showTooltip(event, ${selectedIdx}, ${w}, ${d})" onmouseleave="hideTooltip()">
          <div class="act-title">${esc(act.title||'Session')}</div>
          <div class="act-meta">${act.durationMins||'?'}min${act.distanceKm ? ' · '+act.distanceKm+'km' : ''}${act.elevationM ? ' · '+act.elevationM+'m' : ''}</div>
          <div class="act-badges">${effortBadge}${typeBadge}</div>
          ${acts.length > 1 ? `<div style="font-size:9px;color:var(--orange);margin-top:2px">+${acts.length-1} more</div>` : ''}
        </div>`;
      } else {
        // Cross-training?
        const ct = scenario.config.crossTrainingDays?.[dayFull[d]];
        if (ct) {
          html += `<div class="day-cell cross-training">
            <div class="act-title" style="color:var(--purple)">${esc(ct)}</div>
            <div class="act-meta">cross-training</div>
          </div>`;
        } else {
          html += `<div class="day-cell empty"></div>`;
        }
      }
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderVolumeChart(plan) {
  const weekKms = [];
  for (let w = 1; w <= plan.weeks; w++) {
    weekKms.push(Math.round(plan.activities.filter(a => a.week === w).reduce((s, a) => s + (a.distanceKm || 0), 0)));
  }
  const maxKm = Math.max(...weekKms, 1);
  let html = '<div class="volume-chart">';
  weekKms.forEach((km, i) => {
    const h = Math.max(3, (km / maxKm) * 65);
    const color = km === 0 ? 'var(--surface2)' : 'var(--pink)';
    html += `<div class="vol-bar-wrap">
      <div class="vol-value">${km}</div>
      <div class="vol-bar" style="height:${h}px;background:${color}"></div>
      <div class="vol-label">W${i+1}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

// ── Tooltip ──
function showTooltip(ev, sIdx, week, day) {
  const r = getResult(sIdx);
  if (!r?.plan?.activities) return;
  const acts = r.plan.activities.filter(a => a.week === week && a.dayOfWeek === day);
  if (acts.length === 0) return;
  const tip = document.getElementById('tooltip');
  let html = '';
  acts.forEach((act, i) => {
    if (i > 0) html += '<hr style="border:none;border-top:1px solid var(--border);margin:8px 0">';
    html += `<h4>${esc(act.title||'Session')}</h4>
      ${act.description ? `<div class="desc">${esc(act.description)}</div>` : ''}
      <div class="meta-row"><span class="k">Type</span><span class="v">${act.type}${act.subType ? ' / '+act.subType : ''}</span></div>
      <div class="meta-row"><span class="k">Effort</span><span class="v">${act.effort||'—'}</span></div>
      <div class="meta-row"><span class="k">Duration</span><span class="v">${act.durationMins||'?'} min</span></div>
      <div class="meta-row"><span class="k">Distance</span><span class="v">${act.distanceKm ? act.distanceKm+' km' : '—'}</span></div>
      ${act.elevationM ? `<div class="meta-row"><span class="k">Elevation</span><span class="v">${act.elevationM} m</span></div>` : ''}
      <div class="meta-row"><span class="k">Schedule</span><span class="v">${act.scheduleType||'planned'}</span></div>
      ${act.date ? `<div class="meta-row"><span class="k">Date</span><span class="v">${act.date}</span></div>` : ''}
      ${act.notes ? '<div style="margin-top:4px;padding-top:4px;border-top:1px solid var(--border);color:var(--muted);font-size:11px">'+esc(act.notes)+'</div>' : ''}`;
  });
  tip.innerHTML = html;
  tip.classList.add('show');
  // Position
  requestAnimationFrame(() => {
    const rect = tip.getBoundingClientRect();
    let x = ev.clientX + 14, y = ev.clientY + 14;
    if (x + rect.width > window.innerWidth - 10) x = ev.clientX - rect.width - 14;
    if (y + rect.height > window.innerHeight - 10) y = ev.clientY - rect.height - 14;
    tip.style.left = Math.max(4, x) + 'px';
    tip.style.top = Math.max(4, y) + 'px';
  });
}
function hideTooltip() { document.getElementById('tooltip').classList.remove('show'); }

// ── Helpers ──
function row(label, value) { return `<div class="input-row"><span class="label">${esc(label)}</span><span class="value">${esc(String(value??'—'))}</span></div>`; }
function pill(num, label) { return `<div class="stat-pill"><div class="n">${num}</div><div class="l">${label}</div></div>`; }
function legendItem(color, label) { return `<div class="legend-item"><div class="legend-dot" style="background:${color}"></div>${label}</div>`; }
function effortColor(e) {
  if (e === 'recovery' || e === 'easy') return 'var(--green)';
  if (e === 'moderate') return 'var(--blue)';
  if (e === 'hard') return 'var(--orange)';
  if (e === 'max') return 'var(--red)';
  return 'var(--surface2)';
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ──
render();
</script>
